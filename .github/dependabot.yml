version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    ignore:
      # Majors are framework migrations (Angular, zod, vitest), not routine
      # patching. Left to Dependabot they sit open and fail CI indefinitely.
      # Do them deliberately: unignore the one package, migrate, re-ignore.
      # Dependabot alerts still fire, so a CVE stays visible either way.
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    groups:
      # Angular releases in lockstep; a partial bump breaks the peer graph.
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
          - 'ng-packagr'
      nest:
        patterns:
          - '@nestjs/*'
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    groups:
      actions:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /apps/vault-api
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
